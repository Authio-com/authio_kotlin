name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  jvm-tests:
    name: ":authio-core unit tests (pure JVM)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.7.0
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.2.2
      - run: ./gradlew :authio-core:test --console=plain
      - if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: jvm-test-reports
          path: authio-core/build/reports/tests/test

  android-build:
    # The Android library + example app need the Android SDK; we install
    # it via android-actions/setup-android. This job is a pure compile
    # check — it doesn't run instrumented tests (those need an emulator
    # which would slow the pipeline to a crawl on every PR).
    name: ":authio-android assemble"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.7.0
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@4a252f5e6fcb2a3c142fe1b0a0b0b0b0b0b0b0b0 # v3.2.0
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.2.2
      # Override gradle.properties (authio.includeAndroid=false by default) so
      # the :authio-android library + jetpack-compose example are included.
      - run: ./gradlew :authio-android:assembleRelease :examples:jetpack-compose:assembleDebug --console=plain -Pauthio.includeAndroid=true
      - if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-build-reports
          path: |
            authio-android/build/reports
            examples/jetpack-compose/build/reports