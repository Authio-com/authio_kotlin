name: publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

# Maven Central via Sonatype OSSRH. The nexus-publish plugin handles the
# staging-repo lifecycle (`publishAllPublicationsToSonatypeRepository`
# stages, then `closeAndReleaseSonatypeStagingRepository` promotes).
# Required secrets:
#   - MAVEN_USERNAME / MAVEN_PASSWORD: OSSRH JIRA token (NOT your password)
#   - SIGNING_KEY    : ASCII-armored GPG private key (gpg --armor --export-secret-keys)
#   - SIGNING_PASSWORD: passphrase for the key
#   - SIGNING_KEY_ID : (optional) long-form GPG key id, e.g. "0123ABCD4567EF89"
#
# Release credentials are mandatory; a tag may not succeed without publishing.
jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
      SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70 # v3.5.0
      - run: ./gradlew build
      - name: Require Maven publish credentials
        run: |
          missing=0
          for name in MAVEN_USERNAME MAVEN_PASSWORD SIGNING_KEY SIGNING_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for a release tag"
              missing=1
            fi
          done
          exit "$missing"
      - name: Publish to Maven Central
        run: ./gradlew publishAllPublicationsToSonatypeRepository closeAndReleaseSonatypeStagingRepository
