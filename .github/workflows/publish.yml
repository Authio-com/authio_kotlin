name: publish

on:
  push:
    tags:
      - 'v*'

# Maven Central via Sonatype OSSRH. The nexus-publish plugin handles the
# staging-repo lifecycle (`publishAllPublicationsToSonatypeRepository`
# stages, then `closeAndReleaseSonatypeStagingRepository` promotes).
# Required secrets:
#   - MAVEN_USERNAME / MAVEN_PASSWORD: OSSRH JIRA token (NOT your password)
#   - SIGNING_KEY    : ASCII-armored GPG private key (gpg --armor --export-secret-keys)
#   - SIGNING_PASSWORD: passphrase for the key
#   - SIGNING_KEY_ID : (optional) long-form GPG key id, e.g. "0123ABCD4567EF89"
#
# We always run `build` so the tag-push proves the artifact still
# compiles, and gate the upload step on MAVEN_USERNAME being present so
# pre-release dry-runs don't fail when secrets aren't wired yet.
jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
      SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew build
      - name: Publish to Maven Central
        if: env.MAVEN_USERNAME != '' && env.SIGNING_KEY != ''
        run: ./gradlew publishAllPublicationsToSonatypeRepository closeAndReleaseSonatypeStagingRepository
      - name: Skip publish (no Maven Central credentials)
        if: env.MAVEN_USERNAME == '' || env.SIGNING_KEY == ''
        run: |
          echo "::notice::MAVEN_USERNAME or SIGNING_KEY not set; skipping publish step."
          echo "Wire OSSRH + signing creds per the integrations playbook §6c, then re-tag to release."
