org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
kotlin.code.style=official
# Required by AGP 8+ when any transitive dep is on AndroidX (credentials,
# activity, browser, etc. all are). Without this the :authio-android
# assemble fails at `mapReleaseSourceSetPaths` with
# "Configuration ... contains AndroidX dependencies, but the
# android.useAndroidX property is not enabled".
android.useAndroidX=true
android.enableJetifier=false
# Set to `true` from CI / Android Studio to include the :authio-android
# library and the :examples:jetpack-compose app. Default is JVM-only so
# the core module builds + tests without an Android SDK.
authio.includeAndroid=false
